services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./logs:/app/logs
    env_file: .env

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

networks:
  default:
    name: dia-network